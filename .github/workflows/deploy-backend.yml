name: Deploy Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'        # ✅ CHANGED: Watch the 'server' folder
      - 'infrastructure/**'
  workflow_dispatch:

env:
  # ✅ Your Real Terraform Outputs (No need to edit)
  AZURE_WEBAPP_NAME: "socialflow-jii2if-api" 
  ACR_NAME: "acrjii2if"
  RESOURCE_GROUP: "socialflow-jii2if-rg"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v3

    # 1. Login to Azure
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 2. Login to ACR
    - name: ACR Login
      run: az acr login --name ${{ env.ACR_NAME }}

    # 3. Build & Push (Pointing to 'server' folder)
    - name: Build and Push Image
      uses: docker/build-push-action@v4
      with:
        context: ./server    # ✅ CHANGED: This fixes the "path not found" error
        push: true
        tags: ${{ env.ACR_NAME }}.azurecr.io/server:${{ github.sha }}

    # 4. Deploy
    - name: Deploy to Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: ${{ env.ACR_NAME }}.azurecr.io/server:${{ github.sha }}
    
    # 5. Restart
    - name: Restart Web App
      run: az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}